<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Order Processing 데모</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
    }
    body {
      max-width: 52rem;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
      line-height: 1.6;
    }

    /* 헤더 */
    .page-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .page-header .badge {
      background: #3b82f6;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      text-transform: uppercase;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #1e3a5f;
      margin: 0;
    }

    .note {
      font-size: 0.82rem;
      color: #64748b;
      background: #e2eaf4;
      border-left: 3px solid #3b82f6;
      border-radius: 0 6px 6px 0;
      padding: 0.6rem 0.9rem;
      margin-bottom: 1.75rem;
    }
    .note code {
      background: #c7d9ee;
      border-radius: 3px;
      padding: 0.1rem 0.3rem;
      font-size: 0.8rem;
      color: #1e3a5f;
    }

    /* 스텝 카드 */
    .card {
      background: #ffffff;
      border: 1px solid #d1dce9;
      border-radius: 12px;
      margin-bottom: 1.25rem;
      padding: 1.25rem 1.4rem 1.1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 0.85rem;
    }
    .step-num {
      width: 1.7rem;
      height: 1.7rem;
      border-radius: 50%;
      background: #3b82f6;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-title span {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1e3a5f;
    }

    label {
      display: block;
      margin: 0.65rem 0 0.2rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border-radius: 7px;
      border: 1.5px solid #cbd5e1;
      background: #f8fafc;
      color: #1a202c;
      font-size: 0.9rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      background: #fff;
    }

    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-top: 0.85rem; }

    button {
      padding: 0.5rem 1.1rem;
      border-radius: 7px;
      border: none;
      background: #3b82f6;
      color: #fff;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover:not(:disabled) { background: #2563eb; }
    button:active:not(:disabled) { transform: scale(0.97); }
    button.secondary {
      background: #e2eaf4;
      color: #1e3a5f;
      border: 1.5px solid #c2d3e8;
    }
    button.secondary:hover:not(:disabled) { background: #cddaee; }
    button.danger {
      background: #fee2e2;
      color: #b91c1c;
      border: 1.5px solid #fca5a5;
    }
    button.danger:hover:not(:disabled) { background: #fecaca; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    pre {
      background: #f1f5f9;
      border: 1px solid #d1dce9;
      border-radius: 8px;
      padding: 0.75rem 0.9rem;
      margin-top: 0.85rem;
      overflow: auto;
      font-size: 0.78rem;
      white-space: pre-wrap;
      word-break: break-all;
      color: #334155;
      min-height: 2.5rem;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <div class="badge">Retail</div>
    <h1>Order Processing — 로컬 데모 UI</h1>
  </div>
  <p class="note">이 페이지는 로컬 서버(<code>demo-web</code>)를 통해서만 배포된 <code>order-processor</code> Lambda를 호출합니다. 같은 <code>orderId</code>로 재실행하면 durable 이름이 겹칠 수 있으니 테스트마다 바꾸세요.</p>

  <div class="card">
    <div class="card-title"><div class="step-num">1</div><span>주문 시작</span></div>
    <label for="orderId">orderId</label>
    <input id="orderId" value="ORD-WEB-001" />
    <label for="customerId">customerId</label>
    <input id="customerId" value="CUST-123" />
    <label for="amount">amount</label>
    <input id="amount" type="number" step="0.01" value="99.99" />
    <div class="row">
      <button type="button" id="btnStart">주문 비동기 시작</button>
    </div>
    <pre id="outStart">(응답 대기)</pre>
  </div>

  <div class="card">
    <div class="card-title"><div class="step-num">2</div><span>콜백 ID 조회</span></div>
    <label for="execArn">DurableExecutionArn</label>
    <input id="execArn" placeholder="1단계 응답의 ARN이 채워집니다" />
    <div class="row">
      <button type="button" id="btnCallback" class="secondary">콜백 ID 가져오기</button>
    </div>
    <pre id="outCallback">(응답 대기)</pre>
  </div>

  <div class="card">
    <div class="card-title"><div class="step-num">3</div><span>결제 승인 / 거절</span></div>
    <label for="callbackId">CallbackId</label>
    <input id="callbackId" placeholder="2단계에서 채워짐" />
    <div class="row">
      <button type="button" id="btnApprove">승인 (approved: true)</button>
      <button type="button" id="btnDecline" class="danger">거절 (approved: false)</button>
    </div>
    <pre id="outApprove">(응답 대기)</pre>
  </div>

  <div class="card">
    <div class="card-title"><div class="step-num">4</div><span>실행 상태 조회</span></div>
    <div class="row">
      <button type="button" id="btnStatus" class="secondary">위 ARN으로 상태 조회</button>
    </div>
    <pre id="outStatus">(응답 대기)</pre>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    $('btnStart').onclick = async () => {
      $('outStart').textContent = '요청 중…';
      const body = {
        orderId: $('orderId').value.trim(),
        customerId: $('customerId').value.trim(),
        amount: $('amount').value,
      };
      const r = await fetch('/api/start-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const j = await r.json();
      $('outStart').textContent = JSON.stringify(j, null, 2);
      if (j.durableExecutionArn) $('execArn').value = j.durableExecutionArn;
    };

    $('btnCallback').onclick = async () => {
      $('outCallback').textContent = '요청 중…';
      const executionArn = $('execArn').value.trim();
      const r = await fetch('/api/fetch-callback', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ executionArn }) });
      const j = await r.json();
      $('outCallback').textContent = JSON.stringify(j, null, 2);
      if (j.callbackId) $('callbackId').value = j.callbackId;
    };

    $('btnApprove').onclick = () => sendApprove(true);
    $('btnDecline').onclick = () => sendApprove(false);

    async function sendApprove(approved) {
      $('outApprove').textContent = '요청 중…';
      const callbackId = $('callbackId').value.trim();
      const r = await fetch('/api/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ callbackId, approved }),
      });
      const j = await r.json();
      $('outApprove').textContent = JSON.stringify(j, null, 2);
    }

    $('btnStatus').onclick = async () => {
      $('outStatus').textContent = '요청 중…';
      const arn = encodeURIComponent($('execArn').value.trim());
      const r = await fetch('/api/execution?arn=' + arn);
      const j = await r.json();
      $('outStatus').textContent = JSON.stringify(j, null, 2);
    };
  </script>
</body>
</html>
